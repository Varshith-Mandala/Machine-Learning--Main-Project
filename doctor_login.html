<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doctor Login</title>
  <link rel="stylesheet" href="static/style.css" />
</head>
<body>

  <!-- Back Button -->
  <a href="index.html" class="doctor-btn">⬅ Back</a>

  <div class="container">
    <h1>👨‍⚕️ Doctor Login</h1>
    <p>Enter your credentials to continue.</p>

    <form action="/doctorAuth" method="POST">
      <div class="input-group">
  <label for="docId">Doctor ID</label>
  <input type="text" id="docId" name="docId" required />
</div>

<div class="input-group">
  <label for="docPass">Password</label>
  <input type="password" id="docPass" name="docPass" required />
</div>


      <button type="submit">Login</button>
    </form>

  </div>
 <script>
document.querySelector("form").addEventListener("submit", function (e) {
    e.preventDefault();

    const id = document.getElementById("docId").value.trim();
    const pass = document.getElementById("docPass").value.trim();

    if (id === "Neuro-2451" && pass === "doctor123") {
        window.location.href = "history.html";
    } else {
        alert("Invalid Doctor ID or Password");
    }
});
</script>
</body>
</html>
