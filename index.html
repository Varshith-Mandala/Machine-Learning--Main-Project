<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brain Tumor Detection</title>
  <link rel="stylesheet" href="static/style.css" />
</head>
<body>

  
  <a href="doctor_login.html" class="doctor-btn">Doctor Login</a>

  <div class="container">
    <h2 style="color: #0d47a1;">🧠 Brain Tumor Detection</h2>
    <p>Upload your MRI scan to check for tumor presence.</p>

    <form id="tumorForm">
      <div class="input-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Enter your name" required />
      </div>

      <div class="input-group">
        <label for="age">Age</label>
        <input type="number" id="age" placeholder="Enter your age" required />
      </div>

      <div class="input-group">
        <label for="mriImage">Upload MRI Image</label>
        <input type="file" id="mriImage" accept="image/*" required />
      </div>

      <button type="submit" id="detectBtn">Detect Tumor</button>
    </form>

    <div id="result" class="hidden">
      <h2>Result:</h2>
      <p id="resultText">Processing...</p>
      <img id="previewImage" alt="MRI Preview" />
    </div>
  </div>

  <script src="static/script.js"></script>


</body>
</html>
